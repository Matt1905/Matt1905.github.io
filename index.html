<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="content-type" content="text/html; charset=utf-8">
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="authorization_endpoint" href="https://indieauth.com/auth">
  <link rel="token_endpoint" href="https://tokens.indieauth.com/token">
 
  <title>Ice guy Hangout</title>
  <style>
    @media (prefers-color-scheme: dark) {
      html { background-color: none; color: #fbfbfb; }
      a { color: #ca8465; }
    }
    body {   
  margin: 0;
  height: 100vh;
  background: linear-gradient(180deg, #0a1a2f, #000000);
  color: #e0f7ff;
  font-family: 'Inter', sans-serif;

    }
    img.u-photo { border-radius: 50%; }
    ul { padding: 0; list-style: none; }
  </style>
  #snow {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
}
</head>

<body>
  <canvas id="snow"></canvas>
  <main class="h-card" rel="author">
  
    <h1>
      I'm <span class="p-name">Iceman</span>.
    </h1>

    <p class="p-note">
      ...and I am a human on the Internet.
    </p>

    <ul>
      <!-- Replace __this_page__ with your domain -->
      <li><a class="u-uid u-url" href="__this_page__">I'll have a reason for you to stay a while soon lol</a></li>

      <!-- Update or remove the below links! -->
      
      <!-- Replace _mygithubid_ with your GitHub username in both places on the next line: -->
      <li>Github: <a class="u-url" href="https://github.com/_mygithubid_" rel="me">@_mygithubid_</a></li>

      <!-- Replace _mytwitterid_ with your Twitter username in both places on the next line: -->
      <li>Twitter: <a class="u-url" href="https://twitter.com/_mytwitterid_" rel="me">@_mytwitterid_</a></li>
      
    </ul>
  </main>
  <script>
const canvas = document.getElementById("snow");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 100; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2 + 1,
    d: Math.random() * 1
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#00e5ff";
  ctx.shadowBlur = 10;
  ctx.shadowColor = "#00e5ff";

  for (let p of particles) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }

  update();
}

function update() {
  for (let p of particles) {
    p.y += p.d + 0.5;
    if (p.y > canvas.height) {
      p.y = 0;
      p.x = Math.random() * canvas.width;
    }
  }
}

setInterval(draw, 33);
</script>
</body>

</html>
